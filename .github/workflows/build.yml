name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper JAR
        run: |
          curl -fL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip -d gradle-dist
          gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StrobeLight-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
